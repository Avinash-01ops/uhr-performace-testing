# ──────────────────────────────────────────────────────────────
# UHR ADT Events — Performance Testing Pipeline
# ──────────────────────────────────────────────────────────────
#
# Test execution order (sequential, each is non-blocking):
#   1. Smoke Test   →   2 VU,  60s   (quick sanity check)
#   2. Load Test    →  50 VU, 600s   (normal production load)
#   3. Stress Test  → 150 VU, 300s   (find the breaking point)
#   4. Spike Test   → 200 VU, 120s   (sudden traffic burst)
#
# After all tests complete (pass or fail):
#   → A unified HTML dashboard is published to GitHub Pages
#   → Results published to GitHub Pages dashboard
#
# Key design decisions:
#   • All 4 tests run in ONE job — JMeter is installed once (saves ~15 min)
#   • Each test step uses continue-on-error so later tests always run
#   • The dashboard always publishes, even if some tests failed
#   • Exit codes are captured to show accurate PASS/FAIL status per test
# ──────────────────────────────────────────────────────────────

name: Performance Tests

# ── Triggers ─────────────────────────────────────────────────
on:
  push:
  pull_request:
  workflow_dispatch:

# ── GitHub Pages permissions ──────────────────────────────────
permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

# ── Only one Pages deployment at a time ──────────────────────
concurrency:
  group: "pages"
  cancel-in-progress: false

# ══════════════════════════════════════════════════════════════
# JOBS
# ══════════════════════════════════════════════════════════════
jobs:

  # ════════════════════════════════════════════════════════════
  # JOB 1 — Run all performance tests (single job, sequential)
  # ════════════════════════════════════════════════════════════
  run-all-tests:
    name: "Run All Performance Tests"
    runs-on: ubuntu-latest

    # Expose per-test exit codes as job outputs for the dashboard
    outputs:
      smoke_status:  ${{ steps.smoke.outcome }}
      load_status:   ${{ steps.load.outcome }}
      stress_status: ${{ steps.stress.outcome }}
      spike_status:  ${{ steps.spike.outcome }}

    env:
      KC_CLIENT_ID:     ${{ secrets.KC_CLIENT_ID }}
      KC_CLIENT_SECRET: ${{ secrets.KC_CLIENT_SECRET }}
      KC_USERNAME:      ${{ secrets.KC_USERNAME }}
      KC_PASSWORD:      ${{ secrets.KC_PASSWORD }}
      JMETER_HOME:      ${{ github.workspace }}/apache-jmeter-5.6.3

    steps:
      # ── Setup ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install JMeter 5.6.3
        run: |
          echo "⬇️  Downloading JMeter 5.6.3..."
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "✅ JMeter installed."
          ./apache-jmeter-5.6.3/bin/jmeter --version 2>&1 | head -3

      - name: Create results directories
        run: mkdir -p results/{smoke,load,stress,spike}

      # ── Validate Keycloak secrets are configured ──────────
      - name: "🔑 Validate Keycloak Secrets"
        run: |
          echo "Checking Keycloak secrets..."
          ERRORS=0
          if [ -z "${KC_CLIENT_ID}" ] || [ "${KC_CLIENT_ID}" = "" ]; then
            echo "❌ KC_CLIENT_ID is empty or not set!"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ KC_CLIENT_ID is set (length: ${#KC_CLIENT_ID})"
          fi
          if [ -z "${KC_CLIENT_SECRET}" ] || [ "${KC_CLIENT_SECRET}" = "" ]; then
            echo "❌ KC_CLIENT_SECRET is empty or not set!"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ KC_CLIENT_SECRET is set (length: ${#KC_CLIENT_SECRET})"
          fi
          if [ -z "${KC_USERNAME}" ] || [ "${KC_USERNAME}" = "" ]; then
            echo "❌ KC_USERNAME is empty or not set!"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ KC_USERNAME is set (length: ${#KC_USERNAME})"
          fi
          if [ -z "${KC_PASSWORD}" ] || [ "${KC_PASSWORD}" = "" ]; then
            echo "❌ KC_PASSWORD is empty or not set!"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ KC_PASSWORD is set (length: ${#KC_PASSWORD})"
          fi
          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ⚠️  ${ERRORS} Keycloak secret(s) missing!"
            echo "  Go to Settings → Secrets → Actions"
            echo "  Add: KC_CLIENT_ID, KC_CLIENT_SECRET, KC_USERNAME, KC_PASSWORD"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi
          echo "✅ All Keycloak secrets validated."

      # ── Debug: Comprehensive Keycloak diagnostics ──────────
      - name: "🔍 Diagnose Keycloak Token Generation"
        run: |
          KC_URL="https://qa-iam.waseel.com/realms/waseel-stg/protocol/openid-connect/token"
          echo "══════════════════════════════════════════════════"
          echo "  KEYCLOAK TOKEN GENERATION DIAGNOSTICS"
          echo "══════════════════════════════════════════════════"
          echo ""
          echo "Endpoint: ${KC_URL}"
          echo "Client ID: ${KC_CLIENT_ID} (len: ${#KC_CLIENT_ID})"
          echo "Username:  ${KC_USERNAME} (len: ${#KC_USERNAME})"
          echo "Secret:    [${KC_CLIENT_ID:0:3}***] (len: ${#KC_CLIENT_SECRET})"
          echo "Password:  [${KC_PASSWORD:0:3}***] (len: ${#KC_PASSWORD})"
          echo ""

          # Test 1: Basic connectivity
          echo "── Test 1: Basic connectivity (GET realm) ──"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 "https://qa-iam.waseel.com/realms/waseel-stg" 2>&1)
          echo "  HTTP Status: ${HTTP}"
          echo ""

          # Test 2: Token with verbose output
          echo "── Test 2: Token request (verbose) ──"
          curl -v -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=password&client_id=${KC_CLIENT_ID}&client_secret=${KC_CLIENT_SECRET}&username=${KC_USERNAME}&password=${KC_PASSWORD}" \
            --connect-timeout 10 --max-time 15 \
            "${KC_URL}" 2>&1 | grep -E "^(< HTTP|< Location|< Content|{|})"
          echo ""

          # Test 3: Token with full response
          echo "── Test 3: Token request (full response) ──"
          RESP=$(curl -s -w "\n---HTTP_CODE:%{http_code}---" \
            -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=password&client_id=${KC_CLIENT_ID}&client_secret=${KC_CLIENT_SECRET}&username=${KC_USERNAME}&password=${KC_PASSWORD}" \
            --connect-timeout 10 --max-time 15 \
            "${KC_URL}")
          echo "${RESP}"
          echo ""

          # Test 4: Check if it's a redirect issue
          echo "── Test 4: Token request (follow redirects) ──"
          RESP2=$(curl -sL -w "\n---HTTP_CODE:%{http_code}---" \
            -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=password&client_id=${KC_CLIENT_ID}&client_secret=${KC_CLIENT_SECRET}&username=${KC_USERNAME}&password=${KC_PASSWORD}" \
            --connect-timeout 10 --max-time 15 \
            "${KC_URL}")
          echo "${RESP2}"
          echo ""

          # Test 5: Try with explicit encoding
          echo "── Test 5: Token request (explicit URL encoding) ──"
          BODY="grant_type=password&client_id=$(printf '%s' "${KC_CLIENT_ID}" | jq -sRr @uri)&client_secret=$(printf '%s' "${KC_CLIENT_SECRET}" | jq -sRr @uri)&username=$(printf '%s' "${KC_USERNAME}" | jq -sRr @uri)&password=$(printf '%s' "${KC_PASSWORD}" | jq -sRr @uri)"
          RESP3=$(curl -s -w "\n---HTTP_CODE:%{http_code}---" \
            -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "${BODY}" \
            --connect-timeout 10 --max-time 15 \
            "${KC_URL}")
          echo "${RESP3}"
          echo ""
          echo "══════════════════════════════════════════════════"

      # ── Debug: Print env vars for JMeter ──────────────────
      - name: "🔍 Print Env Vars"
        run: |
          echo "Environment variables visible to JMeter:"
          echo "  KC_CLIENT_ID=[${KC_CLIENT_ID:0:3}***] len=${#KC_CLIENT_ID}"
          echo "  KC_CLIENT_SECRET=[${KC_CLIENT_SECRET:0:3}***] len=${#KC_CLIENT_SECRET}"
          echo "  KC_USERNAME=[${KC_USERNAME:0:3}***] len=${#KC_USERNAME}"
          echo "  KC_PASSWORD=[${KC_PASSWORD:0:3}***] len=${#KC_PASSWORD}"
          echo "  All env vars with KC:"
          env | grep -i "^KC_" || echo "  (none found)"

      # ── Test 1: Smoke ──────────────────────────────────────
      - name: "🔵 Smoke Test (2 VU, 60s)"
        id: smoke
        continue-on-error: true
        run: |
          echo "──────────────────────────────────────────"
          echo "  SMOKE TEST — 2 Virtual Users, 60 seconds"
          echo "──────────────────────────────────────────"
          $JMETER_HOME/bin/jmeter \
            -n \
            -t test-plan-smoke.jmx \
            -l results/smoke/results.csv \
            -e \
            -o results/smoke/html_report
          EXIT_CODE=$?
          echo "✅ Smoke Test finished with exit code: ${EXIT_CODE}"
          if [ -f results/smoke/results.csv ] && grep -q "false" results/smoke/results.csv; then
            echo "❌ ERROR rows detected in results.csv:"
            grep "false" results/smoke/results.csv | head -5
          fi
          if [ -f jmeter.log ]; then
            echo "--- Last 30 lines of jmeter.log ---"
            tail -30 jmeter.log
          fi
          exit ${EXIT_CODE}

      # ── Test 2: Load ───────────────────────────────────────
      - name: "🟡 Load Test (50 VU, 10min)"
        id: load
        continue-on-error: true
        run: |
          echo "──────────────────────────────────────────"
          echo "  LOAD TEST — 50 Virtual Users, 10 minutes"
          echo "──────────────────────────────────────────"
          $JMETER_HOME/bin/jmeter \
            -n \
            -t test-plan-load.jmx \
            -l results/load/results.csv \
            -e \
            -o results/load/html_report
          EXIT_CODE=$?
          echo "✅ Load Test finished with exit code: ${EXIT_CODE}"
          if [ -f jmeter.log ]; then
            echo "--- Last 30 lines of jmeter.log ---"
            tail -30 jmeter.log
          fi
          exit ${EXIT_CODE}

      # ── Test 3: Stress ─────────────────────────────────────
      - name: "🟠 Stress Test (150 VU, 5min)"
        id: stress
        continue-on-error: true
        run: |
          echo "──────────────────────────────────────────"
          echo "  STRESS TEST — 150 Virtual Users, 5 minutes"
          echo "──────────────────────────────────────────"
          $JMETER_HOME/bin/jmeter \
            -n \
            -t test-plan-stress.jmx \
            -l results/stress/results.csv \
            -e \
            -o results/stress/html_report
          EXIT_CODE=$?
          echo "✅ Stress Test finished with exit code: ${EXIT_CODE}"
          if [ -f jmeter.log ]; then
            echo "--- Last 30 lines of jmeter.log ---"
            tail -30 jmeter.log
          fi
          exit ${EXIT_CODE}

      # ── Test 4: Spike ──────────────────────────────────────
      - name: "🔴 Spike Test (200 VU, 2min)"
        id: spike
        continue-on-error: true
        run: |
          echo "──────────────────────────────────────────"
          echo "  SPIKE TEST — 200 Virtual Users, 2 minutes"
          echo "──────────────────────────────────────────"
          $JMETER_HOME/bin/jmeter \
            -n \
            -t test-plan-spike.jmx \
            -l results/spike/results.csv \
            -e \
            -o results/spike/html_report
          EXIT_CODE=$?
          echo "✅ Spike Test finished with exit code: ${EXIT_CODE}"
          if [ -f jmeter.log ]; then
            echo "--- Last 30 lines of jmeter.log ---"
            tail -30 jmeter.log
          fi
          exit ${EXIT_CODE}

      # ── Upload all raw results (CSV + HTML reports) ────────
      - name: Upload all test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-test-results
          path: results/
          retention-days: 30

      # ── Upload jmeter.log for diagnostics ──────────────────
      - name: Upload jmeter.log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-log
          path: jmeter.log
          retention-days: 30

  # ════════════════════════════════════════════════════════════
  # JOB 2 — Build dashboard & publish to GitHub Pages
  # ════════════════════════════════════════════════════════════
  publish-report:
    name: "Publish Dashboard to GitHub Pages"
    runs-on: ubuntu-latest
    needs: run-all-tests
    if: always()

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: all-test-results
          path: results
        # If the test job was skipped entirely (e.g. no artifacts), continue anyway
        continue-on-error: true

      # ── Parse CSV files & generate the dashboard ──────────
      - name: Generate dashboard index.html
        env:
          SMOKE_STATUS:  ${{ needs.run-all-tests.outputs.smoke_status }}
          LOAD_STATUS:   ${{ needs.run-all-tests.outputs.load_status }}
          STRESS_STATUS: ${{ needs.run-all-tests.outputs.stress_status }}
          SPIKE_STATUS:  ${{ needs.run-all-tests.outputs.spike_status }}
          GITHUB_SHA:    ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR:  ${{ github.actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python3 scripts/generate_dashboard.py

      # ── Copy JMeter HTML sub-reports into public/ ─────────
      - name: Copy sub-reports into public folder
        if: always()
        run: |
          for test in smoke load stress spike; do
            src="results/${test}/html_report"
            dst="public/${test}"
            if [ -d "$src" ]; then
              cp -r "$src" "$dst"
              echo "✅ Copied ${test} report → public/${test}/"
            else
              echo "⚠️  No HTML report found for ${test} — skipping"
            fi
          done
          echo ""
          echo "📁 public/ contents:"
          find public/ -maxdepth 2 | sort

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


