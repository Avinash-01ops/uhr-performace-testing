# ──────────────────────────────────────────────────────────────
# Performance Testing Workflow
# ──────────────────────────────────────────────────────────────
# This workflow runs the JMeter test plan automatically on every
# push to any branch and on every pull request.
#
# What it does:
#   1. Checks out your code
#   2. Installs Java (required by JMeter)
#   3. Downloads and installs JMeter
#   4. Runs the JMeter test plan in non-GUI (CLI) mode
#   5. Generates an HTML report
#   6. Uploads results as downloadable artifacts
# ──────────────────────────────────────────────────────────────

name: Performance Tests

# ── When to run ──────────────────────────────────────────────
# Runs on: every push to any branch, and every pull request
on:
  push:
  pull_request:

# ── Jobs ─────────────────────────────────────────────────────
jobs:
  performance-test:
    name: Run JMeter Tests

    # Use GitHub's free Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Check out the repository ───────────────────
      # Downloads your code so the runner can access the JMX file
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Java ────────────────────────────────
      # JMeter requires Java to run. We use Java 11 (LTS) which
      # is compatible with JMeter 5.x.
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      # ── Step 3: Install JMeter ─────────────────────────────
      # Downloads JMeter 5.6.3 and extracts it.
      # The version matches what your JMX file was created with.
      - name: Install JMeter 5.6.3
        run: |
          echo "Downloading JMeter..."
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          echo "Extracting JMeter..."
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "JMeter installed at: $(pwd)/apache-jmeter-5.6.3"
          echo "JMeter version:"
          ./apache-jmeter-5.6.3/bin/jmeter --version

      # ── Step 4: Create results directory ───────────────────
      # JMeter needs this folder to write output files
      - name: Create results directory
        run: mkdir -p results

      # ── Step 5: Run JMeter test plan ───────────────────────
      # -n  → non-GUI mode (required for CI/CD)
      # -t   → path to the JMX test plan file
      # -l   → path to the results (log) file in CSV format
      # -e   → generate HTML report after test completes
      # -o   → output directory for the HTML report
      - name: Run JMeter Test Plan
        run: |
          echo "Starting JMeter test..."
          ./apache-jmeter-5.6.3/bin/jmeter \
            -n \
            -t "UHR_ADT Events_Performance Testing-.jmx" \
            -l results/results.csv \
            -e \
            -o results/html_report
          echo "JMeter test completed."

      # ── Step 6: Upload test results as artifacts ───────────
      # Artifacts are files saved after the workflow finishes.
      # You can download them from the GitHub Actions UI.
      # They are kept for 90 days by default.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-results
          path: results/
          retention-days: 30
