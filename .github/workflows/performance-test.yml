# ──────────────────────────────────────────────────────────────
# Performance Testing Workflow
# ──────────────────────────────────────────────────────────────
# This workflow runs JMeter performance tests automatically on
# every push and pull request.
#
# Test execution order (sequential):
#   1. Smoke Test   → 2 VU, 60s   (quick validation)
#   2. Load Test   → 50 VU, 10min (normal load)
#   3. Stress Test → 150 VU, 5min (find breaking point)
#   4. Spike Test  → 200 VU, 2min (sudden burst)
#
# After all tests:
#   - HTML report published to GitHub Pages (free)
#   - Summary notification sent to Microsoft Teams
# ──────────────────────────────────────────────────────────────

name: Performance Tests

# ── When to run ──────────────────────────────────────────────
on:
  push:
  pull_request:
  workflow_dispatch:

# ── Permissions for GitHub Pages ────────────────────────────
permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

# ── Allow only one deployment at a time ──────────────────────
concurrency:
  group: "pages"
  cancel-in-progress: false

# ── Jobs ─────────────────────────────────────────────────────
jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1: Smoke Test (quick validation)
  # ════════════════════════════════════════════════════════════
  smoke-test:
    name: "1. Smoke Test (2 VU, 60s)"
    runs-on: ubuntu-latest

    env:
      KC_CLIENT_ID: ${{ secrets.KC_CLIENT_ID }}
      KC_CLIENT_SECRET: ${{ secrets.KC_CLIENT_SECRET }}
      KC_USERNAME: ${{ secrets.KC_USERNAME }}
      KC_PASSWORD: ${{ secrets.KC_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Install JMeter 5.6.3
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "JMeter version:"
          ./apache-jmeter-5.6.3/bin/jmeter --version

      - name: Create results directory
        run: mkdir -p results/smoke

      - name: Run Smoke Test
        run: |
          echo "Starting Smoke Test..."
          ./apache-jmeter-5.6.3/bin/jmeter \
            -n \
            -t test-plan-smoke.jmx \
            -l results/smoke/results.csv \
            -e \
            -o results/smoke/html_report
          echo "Smoke Test completed."

      - name: Upload Smoke Test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-smoke-results
          path: results/smoke/
          retention-days: 30

      - name: Upload report for Pages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: results/smoke/html_report/
          retention-days: 7

  # ════════════════════════════════════════════════════════════
  # JOB 2: Load Test (normal load)
  # ════════════════════════════════════════════════════════════
  load-test:
    name: "2. Load Test (50 VU, 10min)"
    runs-on: ubuntu-latest
    needs: smoke-test

    env:
      KC_CLIENT_ID: ${{ secrets.KC_CLIENT_ID }}
      KC_CLIENT_SECRET: ${{ secrets.KC_CLIENT_SECRET }}
      KC_USERNAME: ${{ secrets.KC_USERNAME }}
      KC_PASSWORD: ${{ secrets.KC_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Install JMeter 5.6.3
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "JMeter version:"
          ./apache-jmeter-5.6.3/bin/jmeter --version

      - name: Create results directory
        run: mkdir -p results/load

      - name: Run Load Test
        run: |
          echo "Starting Load Test..."
          ./apache-jmeter-5.6.3/bin/jmeter \
            -n \
            -t test-plan-load.jmx \
            -l results/load/results.csv \
            -e \
            -o results/load/html_report
          echo "Load Test completed."

      - name: Upload Load Test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-load-results
          path: results/load/
          retention-days: 30

      - name: Upload report for Pages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-report
          path: results/load/html_report/
          retention-days: 7

  # ════════════════════════════════════════════════════════════
  # JOB 3: Stress Test (find breaking point)
  # ════════════════════════════════════════════════════════════
  stress-test:
    name: "3. Stress Test (150 VU, 5min)"
    runs-on: ubuntu-latest
    needs: load-test

    env:
      KC_CLIENT_ID: ${{ secrets.KC_CLIENT_ID }}
      KC_CLIENT_SECRET: ${{ secrets.KC_CLIENT_SECRET }}
      KC_USERNAME: ${{ secrets.KC_USERNAME }}
      KC_PASSWORD: ${{ secrets.KC_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Install JMeter 5.6.3
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "JMeter version:"
          ./apache-jmeter-5.6.3/bin/jmeter --version

      - name: Create results directory
        run: mkdir -p results/stress

      - name: Run Stress Test
        run: |
          echo "Starting Stress Test..."
          ./apache-jmeter-5.6.3/bin/jmeter \
            -n \
            -t test-plan-stress.jmx \
            -l results/stress/results.csv \
            -e \
            -o results/stress/html_report
          echo "Stress Test completed."

      - name: Upload Stress Test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-stress-results
          path: results/stress/
          retention-days: 30

      - name: Upload report for Pages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-report
          path: results/stress/html_report/
          retention-days: 7

  # ════════════════════════════════════════════════════════════
  # JOB 4: Spike Test (sudden burst)
  # ════════════════════════════════════════════════════════════
  spike-test:
    name: "4. Spike Test (200 VU, 2min)"
    runs-on: ubuntu-latest
    needs: stress-test

    env:
      KC_CLIENT_ID: ${{ secrets.KC_CLIENT_ID }}
      KC_CLIENT_SECRET: ${{ secrets.KC_CLIENT_SECRET }}
      KC_USERNAME: ${{ secrets.KC_USERNAME }}
      KC_PASSWORD: ${{ secrets.KC_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Install JMeter 5.6.3
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "JMeter version:"
          ./apache-jmeter-5.6.3/bin/jmeter --version

      - name: Create results directory
        run: mkdir -p results/spike

      - name: Run Spike Test
        run: |
          echo "Starting Spike Test..."
          ./apache-jmeter-5.6.3/bin/jmeter \
            -n \
            -t test-plan-spike.jmx \
            -l results/spike/results.csv \
            -e \
            -o results/spike/html_report
          echo "Spike Test completed."

      - name: Upload Spike Test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-spike-results
          path: results/spike/
          retention-days: 30

      - name: Upload report for Pages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spike-report
          path: results/spike/html_report/
          retention-days: 7

  # ════════════════════════════════════════════════════════════
  # JOB 5: Publish Reports to GitHub Pages
  # ════════════════════════════════════════════════════════════
  publish-report:
    name: "Publish Report to GitHub Pages"
    runs-on: ubuntu-latest
    needs: [smoke-test, load-test, stress-test, spike-test]
    if: always()

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Prepare Pages structure
        run: |
          mkdir -p public
          cat > public/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=smoke/index.html">
            <title>Performance Test Reports</title>
          </head>
          <body>
            <h1>UHR ADT Performance Test Reports</h1>
            <ul>
              <li><a href="smoke/index.html">Smoke Test Report</a></li>
              <li><a href="load/index.html">Load Test Report</a></li>
              <li><a href="stress/index.html">Stress Test Report</a></li>
              <li><a href="spike/index.html">Spike Test Report</a></li>
            </ul>
            <p>Generated: ${{ github.event.head_commit.timestamp }}</p>
            <p>Commit: ${{ github.sha }}</p>
            <p>Branch: ${{ github.ref_name }}</p>
          </body>
          </html>
          HTMLEOF
          if [ -d "all-reports/smoke-report" ]; then cp -r all-reports/smoke-report public/smoke; fi
          if [ -d "all-reports/load-report" ]; then cp -r all-reports/load-report public/load; fi
          if [ -d "all-reports/stress-report" ]; then cp -r all-reports/stress-report public/stress; fi
          if [ -d "all-reports/spike-report" ]; then cp -r all-reports/spike-report public/spike; fi
          echo "Pages structure prepared."
          ls -la public/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ════════════════════════════════════════════════════════════
  # JOB 6: Notify Microsoft Teams
  # ════════════════════════════════════════════════════════════
  notify-teams:
    name: "Send Teams Notification"
    runs-on: ubuntu-latest
    needs: [smoke-test, load-test, stress-test, spike-test]
    if: always()

    steps:
      - name: Send notification to Teams
        uses: skitionek/msteams-notify@v1
        if: env.MSTEAMS_WEBHOOK_URL != ''
        env:
          MSTEAMS_WEBHOOK_URL: ${{ secrets.MSTEAMS_WEBHOOK_URL }}
        with:
          webhook_uri: ${{ secrets.MSTEAMS_WEBHOOK_URL }}
          title: "Performance Tests Completed"
          summary: "UHR ADT Performance Test Results"
          text: |
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Triggered by:** ${{ github.actor }}

            **Test Status:**
            - Smoke: ${{ needs.smoke-test.result }}
            - Load: ${{ needs.load-test.result }}
            - Stress: ${{ needs.stress-test.result }}
            - Spike: ${{ needs.spike-test.result }}

            **Report:** ${{ needs.publish-report.outputs.page_url || 'N/A' }}
          themeColor: >-
            ${{ needs.smoke-test.result == 'success' &&
                needs.load-test.result == 'success' &&
                needs.stress-test.result == 'success' &&
                needs.spike-test.result == 'success' && '00FF00' || 'FF0000' }}
